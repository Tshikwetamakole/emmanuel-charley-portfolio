<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="refresh" content="0; url=/" />
  <script>
    (function() {
      // Move path into hash so SPA can handle it on GitHub Pages
      var p = location.pathname + location.search;
      if (p !== '/' && !location.hash) {
        location.replace('/#' + p);
      }
    })();
  </script>
  <title>Redirecting…</title>
</head>
<body>Redirecting…</body>
</html>
